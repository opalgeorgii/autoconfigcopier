// ===================================================
//                  SERVER CONFIG
// ===================================================

echo ---------------------------
echo - Loading server settings -
echo ---------------------------

// ---------------------------
// General / Server Info
// ---------------------------
hostname "<server_name> Server"       // Server name shown in server browser
sv_lan "0"                            // 0 = online, 1 = LAN only
sv_region "255"                       // 255 = worldwide

// ---------------------------
// Performance / Network
// ---------------------------
sv_maxrate "0"                         // Max bandwidth rate allowed, 0 = unlimited
sv_minrate "0"                         // Min bandwidth rate allowed, 0 = unlimited
sv_parallel_sendsnapshot "1"           // Enable multi-threading for better performance
sv_clockcorrection_msecs "15"          // Keep player ticks in sync
sv_hibernate_when_empty "0"            // Low CPU usage when no players connected

// ---------------------------
// Admin / Security
// ---------------------------
//sv_password "<password>"                 // Password to join the server
// rcon_password "<password>"            // RCON password for remote admin commands

// ---------------------------
// Optional / Extra
// ---------------------------
// sv_downloadurl "http://fastdl.server.com/csgo"  // FastDL URL if you have one

echo ---------------------------
echo - Done loading server.cfg -
echo ---------------------------